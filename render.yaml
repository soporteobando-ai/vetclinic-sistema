services:
  - type: web
    name: vetclinic-api
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run db:generate && npm run db:push && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # Se carga manualmente en el dashboard de Render
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false          # URL de Vercel: https://tu-app.vercel.app
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
    healthCheckPath: /api/health
